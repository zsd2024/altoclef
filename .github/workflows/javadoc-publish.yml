name: 部署 Javadoc

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # 保留完整历史，便于部署

      - name: 安装 JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: adopt

      - name: 生成 Javadoc
        run: ./gradlew javadoc --stacktrace

      - name: 部署到 GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: javadoc              # 部署到 javadoc 分支
          folder: build/docs/javadoc   # Javadoc 输出目录
          target-folder: javadoc       # 分支中的目标目录
          clean: true                  # 清理旧文件
