name: 使用 Gradle 的 Java CI（Matrix + 自动清理）

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: [ "1.16.5", "1.17.1", "1.18.2", "1.20.4", "1.21", "1.21.1"]

    env:
      INCLUDE_DEVLIBS: "true"

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: 赋予 gradlew 可执行权限
        run: chmod +x gradlew

      - name: 设置当前构建版本
        run: |
          mkdir -p versions
          echo "${{ matrix.version }}" > versions/mainProject

      - name: 使用 Gradle 构建
        run: ./gradlew build --stacktrace

      - name: 收集构建产物
        run: |
          mkdir -p artifacts/${{ matrix.version }}/libs
          if ls versions/${{ matrix.version }}/build/libs/*.jar 1> /dev/null 2>&1; then
            cp versions/${{ matrix.version }}/build/libs/*.jar artifacts/${{ matrix.version }}/libs/
          fi

          if [ "$INCLUDE_DEVLIBS" = "true" ]; then
            mkdir -p artifacts/${{ matrix.version }}/devlibs
            if ls versions/${{ matrix.version }}/build/devlibs/*.jar 1> /dev/null 2>&1; then
              cp versions/${{ matrix.version }}/build/devlibs/*.jar artifacts/${{ matrix.version }}/devlibs/
            fi
          fi

      - name: 计算 SHA256 哈希
        run: |
          touch artifacts/${{ matrix.version }}/hashes.txt
          find artifacts/${{ matrix.version }} -name '*.jar' -type f | while read jar; do
            sha256sum "$jar" >> artifacts/${{ matrix.version }}/hashes.txt
          done

      - name: 上传构建产物（按版本）
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.version }}
          path: artifacts/${{ matrix.version }}

  cleanup:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 清理旧 artifacts（仅保留最近 10 个）
        uses: actions/github-script@v7
        with:
          script: |
            const maxToKeep = 10;
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const sorted = artifacts.data.artifacts.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );

            for (let i = maxToKeep; i < sorted.length; i++) {
              const artifact = sorted[i];
              console.log(`Deleting artifact: ${artifact.name}`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
            }
