name: 使用 Gradle 的 Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      LATEST_VERSION: "1.21"
      INCLUDE_DEVLIBS: "true"
      VERSIONS_TO_BUILD: "1.16.5 1.17.1 1.18.2 1.20.4 1.21"

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: 赋予 gradlew 可执行权限
        run: chmod +x gradlew

      # - name: 创建 versions 目录并写入 mainProject
      #   run: |
      #     mkdir -p ./versions
      #     if [ ! -f ./versions/mainProject ]; then
      #       echo "$LATEST_VERSION" > ./versions/mainProject
      #     fi

      - name: 使用 Gradle 构建
        run: ./gradlew build --stacktrace

      - name: 创建 artifact 目录结构并复制构建产物
        run: |
          mkdir -p artifacts
          for version in $VERSIONS_TO_BUILD; do
            mkdir -p artifacts/$version/libs
            if ls ./versions/$version/build/libs/*.jar 1> /dev/null 2>&1; then
              cp ./versions/$version/build/libs/*.jar artifacts/$version/libs/
            fi

            if [ "$INCLUDE_DEVLIBS" = "true" ]; then
              mkdir -p artifacts/$version/devlibs
              if ls ./versions/$version/build/devlibs/*.jar 1> /dev/null 2>&1; then
                cp ./versions/$version/build/devlibs/*.jar artifacts/$version/devlibs/
              fi
            fi
          done

      - name: 计算 SHA256 哈希
        run: |
          touch artifacts/hashes.txt
          find artifacts -name '*.jar' -type f | while read jar; do
            sha256sum "$jar" >> artifacts/hashes.txt
          done

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 构建产物
          path: artifacts
